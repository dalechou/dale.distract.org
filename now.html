<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Dale's now page</title>
    <link href='./styles.css' rel='stylesheet'>
    <script src='https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js'></script>
</head>
<body>
<header>
<nav>
    <div id='mainnav'></div>
    <script>
    $(function(){
        $('#mainnav').load('nav.html');
    });
    </script>
    <br>
</nav>
</header>

    <div id='randomLine'></div>
    <div id='lastUpdate'></div>
    <script>
        function fetchRandomLine() {
            fetch('./now.txt', { method: 'HEAD' })
                .then(response => {
                    const lastModified = response.headers.get('last-modified');
                    if (lastModified) {
                        const date = new Date(lastModified);
                        const day = date.toLocaleDateString('en-US', { timeZone: 'America/Los_Angeles', day: 'numeric' });
                        const month = date.toLocaleDateString('en-US', { timeZone: 'America/Los_Angeles', month: 'long' });
                        const year = date.toLocaleDateString('en-US', { timeZone: 'America/Los_Angeles', year: 'numeric' });
                        document.getElementById('lastUpdate').innerHTML = `<p>Last update on ${day} ${month} ${year}.</p>`;
                    }
                })
                .catch(error => console.error('Error:', error));
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('randomLine').innerHTML = '<p>Temporal error!</p>';
                });
        }
        window.onload = fetchRandomLine;
    </script>

    <hr>
    <h1>What's this?</h1>
    <p>This is a now page, inspired by <span class='inherit'><a href='https://nownownow.com/about'>Derek Sivers</a></span> but with a twist. Instead of what I would tell a friend I had not seen in a year—the original project intent, this is a histotomy of my current life in natural habitat. Things that I might do after work or over a relaxing weekend.</p>
</body>
</html>
