<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Dale Chou's painting</title>
    <link rel='stylesheet' href='../styles.css'>
    <script src='https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js'></script>
</head>
<body>
<header>
<nav>
    <div id='mainnav'></div>
    <script>
    $(function(){
        $('#mainnav').load('nav.html');
    });
    </script>
    <br>
</nav>
</header>
<section class='portfolio-grid'>
    
    <article class='portfolio-item'>
        <img src='./images/2025-11-02.jpg' alt='Pale flowers in a glass vase'>
        <pre>8″ × 10″ oil on canvas</pre>
    </article>

    <article class='portfolio-item'>
        <img src='./images/2025-10-27.jpg' alt='Leather chair and ottoman set against closed window, coffee table, lamp, and sofa also visible'>
        <p>10″ × 8″ oil on canvas</p>
    </article>
    
    <article class='portfolio-item'>
        <img src='./images/2025-04-28.jpg' alt='Yellow flowers in a bluish grey vase'>
        <p>16″ × 20″ oil on canvas (sold)</p>
    </article>
    
    <article class='portfolio-item'>
        <img src='./images/2025-02-22.jpg' alt='Flower plush with yellow petals, plump green body, and a big smile'>
        <p>8″ × 10″ oil on canvas</p>
    </article>
    
    <article class='portfolio-item'>
        <img src='./images/2025-01-20.jpg' alt='Red apple on easel'>
        <p>8″ × 10″ oil on canvas</p>
    </article>
    
    <article class='portfolio-item'>
        <img src='./images/2025-01-13.jpg' alt='Person with curly hair looking ahead'>
        <p>8″ × 10″ oil on canvas</p>
    </article>
    
    <article class='portfolio-item'>
        <img src='./images/2025-01-01.jpg' alt='Person in green hat and cloak sitting in front of a table'>
        <p>8″ × 10″ oil on canvas</p>
    </article>
    
    <article class='portfolio-item'>
        <img src='./images/2024-11-29.jpg' alt='Red apples in pale green basket'>
        <p>Oil on random paper</p>
    </article>
    
    <article class='portfolio-item'>
        <img src='./images/2024-11-04.jpg' alt='Eyes staring ahead with loosely tree-like features'>
        <p>10″ × 8″ oil on canvas</p>
    </article>
    
    <article class='portfolio-item'>
        <img src='./images/2024-10-18.jpg' alt='A candle lit and set over a table'>
        <p>8″ × 10″ oil on canvas</p>
    </article>

    <article class='portfolio-item'>
        <img src='./images/2024-09-22.jpg' alt='Flowers in a blue vase'>
        <p>8″ × 10″ oil on canvas<p>
    </article>

</section>
<div id='lightbox' class='lightbox'>
    <div class='lightbox-content'>
        <button class='lightbox-close'>&times;</button>
        <img id='lightbox-img' src='' alt=''>
    </div>
</div>
<script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxClose = document.querySelector('.lightbox-close');
    const portfolioImages = document.querySelectorAll('.portfolio-item img');

    portfolioImages.forEach(img => {
        img.addEventListener('click', function() {
            lightboxImg.src = this.src;
            lightboxImg.alt = this.alt;
            lightbox.classList.add('active');
        });
    });

    lightboxClose.addEventListener('click', function() {
        lightbox.classList.remove('active');
    });

    lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) {
            lightbox.classList.remove('active');
        }
    });
</script>
<footer>
<nav>
    <a href='#'><span class='material-symbols-rounded'>vertical_align_top</span></a>
</nav>
</footer>
</body>
</html>
